services:
  postgres:
    image: postgres:18
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env.prod

  django-service:
    build: .
    container_name: django-service-docker
    depends_on:
      - postgres
    volumes:
      - ./static:/app/static/
    env_file:
      - .env.prod

  nginx:
    image: nginx:latest
    ports:
      - "4729:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/static:ro
    depends_on:
      - django-service
volumes:
  postgres_data: